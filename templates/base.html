<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>
    Flask Auth
  </title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:        #0F172A;
      --surface:   #1E293B;
      --border:    #334155;
      --accent:    #6366F1;
      --accent-hover: #818CF8;
      --text:      #F8FAFC;
      --muted:     #94A3B8;
      --error:     #F87171;
      --radius:    10px;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    /* ── Nav ─────────────────────────────────── */
    nav {
      position: sticky;
      top: 0;
      z-index: 10;
      background: rgba(15, 23, 42, 0.85);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 0 2rem;
      height: 56px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .nav-brand {
      font-weight: 600;
      font-size: 1rem;
      letter-spacing: -0.02em;
      color: var(--text);
      text-decoration: none;
    }

    .nav-brand span { color: var(--accent); }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 0.25rem;
    }

    .nav-greeting {
      font-size: 0.875rem;
      color: var(--muted);
      margin-right: 0.75rem;
    }

    .nav-links a {
      font-size: 0.875rem;
      font-weight: 500;
      color: var(--muted);
      text-decoration: none;
      padding: 0.375rem 0.75rem;
      border-radius: 6px;
      transition: color 0.15s, background 0.15s;
    }

    .nav-links a:hover {
      color: var(--text);
      background: var(--surface);
    }

    .nav-links a.btn-nav {
      color: var(--accent);
      border: 1px solid var(--accent);
    }

    .nav-links a.btn-nav:hover {
      background: var(--accent);
      color: #fff;
    }

    /* ── Main content area ───────────────────── */
    main {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 3rem 1rem;
    }

    /* ── Auth card ───────────────────────────── */
    .auth-card {
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.08), 0 20px 40px rgba(0,0,0,0.4);
    }

    .auth-card h2 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.375rem;
    }

    .auth-card .subtitle {
      font-size: 0.875rem;
      color: var(--muted);
      margin-bottom: 2rem;
    }

    /* ── Form elements ───────────────────────── */
    .field {
      display: flex;
      flex-direction: column;
      gap: 0.375rem;
      margin-bottom: 1rem;
    }

    .field label {
      font-size: 0.8125rem;
      font-weight: 500;
      color: var(--muted);
      letter-spacing: 0.01em;
    }

    .field input {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 7px;
      color: var(--text);
      font-family: inherit;
      font-size: 0.9375rem;
      padding: 0.625rem 0.875rem;
      outline: none;
      transition: border-color 0.15s, box-shadow 0.15s;
      width: 100%;
    }

    .field input::placeholder { color: #475569; }

    .field input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.18);
    }

    /* ── Submit button ───────────────────────── */
    .btn-primary {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.6875rem 1rem;
      background: var(--accent);
      color: #fff;
      font-family: inherit;
      font-size: 0.9375rem;
      font-weight: 600;
      border: none;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, transform 0.1s;
      letter-spacing: -0.01em;
    }

    .btn-primary:hover  { background: var(--accent-hover); }
    .btn-primary:active { transform: scale(0.98); }

    /* ── Auth footer link ────────────────────── */
    .auth-footer {
      margin-top: 1.5rem;
      text-align: center;
      font-size: 0.8125rem;
      color: var(--muted);
    }

    .auth-footer a {
      color: var(--accent);
      text-decoration: none;
      font-weight: 500;
    }

    .auth-footer a:hover { color: var(--accent-hover); }

    /* ── Dashboard card ──────────────────────── */
    .dashboard-card {
      width: 100%;
      max-width: 560px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 2.5rem 2rem;
      box-shadow: 0 0 0 1px rgba(99,102,241,0.08), 0 20px 40px rgba(0,0,0,0.4);
    }

    .dashboard-card h2 {
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: -0.03em;
      margin-bottom: 0.5rem;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 0.375rem;
      background: rgba(99,102,241,0.15);
      color: var(--accent-hover);
      border: 1px solid rgba(99,102,241,0.3);
      border-radius: 99px;
      font-size: 0.75rem;
      font-weight: 500;
      padding: 0.25rem 0.75rem;
      margin-top: 0.75rem;
    }

    .badge::before {
      content: '';
      width: 7px;
      height: 7px;
      background: #4ade80;
      border-radius: 50%;
      box-shadow: 0 0 6px #4ade80;
    }

    /* ── Flash messages ──────────────────────── */
    .flash {
      padding: 0.75rem 1rem;
      border-radius: 7px;
      font-size: 0.875rem;
      margin-bottom: 1.25rem;
    }
    .flash.error   { background: rgba(248,113,113,0.1); border: 1px solid rgba(248,113,113,0.3); color: var(--error); }
    .flash.success { background: rgba(74,222,128,0.1);  border: 1px solid rgba(74,222,128,0.3);  color: #4ade80; }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after { transition: none !important; }
    }

    @media (max-width: 480px) {
      nav { padding: 0 1rem; }
      .auth-card, .dashboard-card { padding: 2rem 1.25rem; }
    }
  </style>
  {% block head %}{% endblock %}
</head>
<body>

  <nav>
    <a href="/" class="nav-brand">Authentication</a>
    <div class="nav-links">
      {% if current_user.is_authenticated %}
        <span class="nav-greeting">{{ current_user.username }}</span>
        <a href="{{ url_for('logout') }}" class="btn-nav">Logout</a>
      {% else %}
        <a href="/">Login</a>
        <a href="/signup" class="btn-nav">Sign up</a>
      {% endif %}
    </div>
  </nav>

  <main>
    {% block content %}{% endblock %}
  </main>

    {% block form %}{% endblock %}
</body>
</html>
